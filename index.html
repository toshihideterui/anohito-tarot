<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="タロットカードがあなたの恋の悩みに答えます。あの人の気持ちを占う無料タロット鑑定。">
<meta name="theme-color" content="#0d0520">
<meta property="og:title" content="あの人の気持ち鑑定｜タロット占い">
<meta property="og:description" content="タロットカードがあなたの恋の悩みに答えます。">
<meta property="og:type" content="website">
<title>あの人の気持ち鑑定｜タロット占い</title>
<link rel="stylesheet" href="css/style.css?v=11">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- アプリ全体コンテナ（カードとボタン・星が消去された綺麗な固定背景） -->
<div class="app init-bg" id="appContainer">
  <!-- 占いメインセクション -->
  <div class="main-section">
    <!-- 3Dフリップカード（中央のカード枠のみが回転する。二重枠を解消） -->
    <div class="card-scene" id="cardScene">
      <div class="card-flipper" id="cardFlipper">
        <!-- 表面：切り抜いた正しいカード裏面 (omote.pngから切り出したもの) -->
        <div class="card-face card-front" id="cardFrontFace">
          <img src="images/card_back_single.png?v=11" alt="カードの裏面">
        </div>
        <!-- 裏面：引いたカード表面 (例：card_fool.png) -->
        <div class="card-face card-back-face" id="cardBackFace">
          <!-- タロットカード（枠付き） -->
          <img id="cardBackImg" src="" alt="カード表面">
          <!-- その上に重ねる動的テキスト -->
          <div class="card-overlay-content">
            <div class="card-guide-title" id="cardGuideTitle">― 月の導き ―</div>
            <div class="card-main-message" id="cardMainMessage">あなたのことをもっと知りたいと思っています</div>
            <div class="card-name-area">
              <div class="card-name-en" id="cardNameEn">THE MOON</div>
              <div class="card-name-ja" id="cardNameJa">月</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 今日の恋愛運（星評価。初期状態では非表示） -->
    <div class="love-fortune" id="loveFortune">
      <div class="love-label">今日の恋愛運</div>
      <div class="stars-row" id="starsRow">★★★★☆</div>
    </div>

    <!-- アクションボタンコンテナ（HTML/CSSで美しいボタンを1から作成） -->
    <div class="action-container" id="actionContainer">
      <button class="tarot-btn" id="invokeBtn">カードを引く</button>
      <button class="tarot-btn again-btn" id="againBtn">もう一度占う</button>
      
      <!-- ローディング -->
      <div class="loading-inline" id="loadingInline">
        <div class="orb"></div>
        <div class="lt" id="loadingText">星に問いかけています…</div>
      </div>
    </div>

    <!-- 履歴表示リンク（初期状態でも結果表示時でも常に下部に配置） -->
    <div class="history-link-container">
      <span class="history-link" id="historyLink">鑑定履歴を見る ＞</span>
    </div>
  </div>
</div>

<!-- エラー確認用トースト -->
<div id="debugToast" style="
  display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(60,20,80,0.97); color:#f0d080; padding:14px 20px;
  border:1px solid rgba(201,168,76,0.5); border-radius:8px;
  font-size:12px; max-width:320px; text-align:center;
  z-index:9999; word-break:break-all; line-height:1.8;
"></div>

<!-- 履歴モーダル（ボディの直下に移動し、表示位置のバグを完全防止） -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">✦ 過去の鑑定記録</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/tarot.js"></script>
<script src="js/canvas.js"></script>
<script src="js/app.js"></script>
</body>
</html>
